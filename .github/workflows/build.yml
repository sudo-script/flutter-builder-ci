name: Build Flutter APK
on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      app_name:
        required: false
        default: 'My App'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: generated

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      # ── PREFLIGHT ANALYZE ────────────────────────────────────────
      # Fails the build in ~30s instead of ~40min when the generated
      # Dart is bad. Paired with backend/dartRepair.js — repair runs
      # before code is pushed; analyze is the final check.
      - name: Analyze (FATAL on any issue)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Build release APK (arm64 only — ~8-15 MB)
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: List APK output
        run: find build/ -name '*.apk' | sort

      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id }}
          path: build/app/outputs/flutter-apk/
          retention-days: 7
          if-no-files-found: error

      # On any failure (analyze, build, whatever) upload the generated
      # lib/ so you can download and inspect what the LLM actually produced.
      - name: Upload generated Dart on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-lib-${{ github.event.inputs.build_id }}
          path: lib/
          retention-days: 3