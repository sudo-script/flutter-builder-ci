name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier from flutter-builder'
        required: true
        type: string
      app_name:
        required: false
        default: 'My App'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: generated

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: List APK output
        run: |
          echo "=== flutter-apk folder ===" 
          ls -lh build/app/outputs/flutter-apk/ || echo "folder missing"
          echo "=== finding all apks ==="
          find build/ -name "*.apk" | sort

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ github.event.inputs.build_id }}
          path: build/app/outputs/flutter-apk/
          retention-days: 7
          if-no-files-found: error
