name: dsf
description: "My App - built with Flutter Builder"
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # Storage & persistence
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  hive_flutter: ^1.1.0

  # Network
  http: ^1.2.2

  # Supabase backend

  # Rich text editor (notes core)
  flutter_quill: ^10.8.5

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.0.0
  audio_waveforms: ^1.0.5

  # Notifications & reminders
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utilities
  uuid: ^4.4.0
  collection: ^1.18.0
  crypto: ^3.0.3

  # UI helpers
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
